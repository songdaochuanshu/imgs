  <text x="164" y="198" fill="#F4D8D1" font-size="20" letter-spacing="8">SONGDAOCHUANSHU BLOG</text>
  <text x="160" y="320" fill="#FFF8F2" font-size="92" font-weight="700">松岛川树</text>
  <text x="164" y="398" fill="#F4D8D1" font-size="30">记录技术、生活与慢一点的观察</text>
  <text x="164" y="468" fill="#EFD2CB" font-size="24">更像一本轻小说封面的个人站，而不是一堆彩色特效。</text>

  <rect x="160" y="534" width="156" height="54" rx="27" fill="#F26C5C"/>
  <text x="205" y="568" fill="white" font-size="22" font-weight="700">进入文章</text>
  <rect x="334" y="534" width="168" height="54" rx="27" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <text x="381" y="568" fill="#FFF2EC" font-size="22" font-weight="600">关于我</text>

  <g opacity="0.95">
    <rect x="160" y="620" width="128" height="34" rx="17" fill="rgba(255,255,255,0.08)"/>
    <text x="191" y="642" fill="#F7E5DE" font-size="18">12 篇文章</text>
    <rect x="302" y="620" width="136" height="34" rx="17" fill="rgba(255,255,255,0.08)"/>
    <text x="333" y="642" fill="#F7E5DE" font-size="18">4 个分类</text>
    <rect x="452" y="620" width="176" height="34" rx="17" fill="rgba(255,255,255,0.08)"/>
    <text x="484" y="642" fill="#F7E5DE" font-size="18">Nuxt + R2 驱动</text>
  </g>

  <rect x="120" y="748" width="1200" height="72" rx="36" fill="rgba(255,255,255,0.68)" stroke="rgba(90,46,60,0.08)"/>
  <rect x="142" y="764" width="96" height="40" rx="20" fill="#2A2125"/>
  <text x="177" y="789" fill="#FFF6F2" font-size="18" font-weight="700">全部</text>
  <rect x="252" y="764" width="104" height="40" rx="20" fill="#FFF6F0" stroke="#EFD7CC"/>
  <text x="287" y="789" fill="#6A4A4E" font-size="18">技术</text>
  <rect x="370" y="764" width="104" height="40" rx="20" fill="#FFF6F0" stroke="#EFD7CC"/>
  <text x="405" y="789" fill="#6A4A4E" font-size="18">生活</text>
  <rect x="488" y="764" width="104" height="40" rx="20" fill="#FFF6F0" stroke="#EFD7CC"/>
  <text x="523" y="789" fill="#6A4A4E" font-size="18">随记</text>
  <rect x="606" y="764" width="104" height="40" rx="20" fill="#FFF6F0" stroke="#EFD7CC"/>
  <text x="641" y="789" fill="#6A4A4E" font-size="18">归档</text>

  <g filter="url(#shadow)">
    <rect x="120" y="872" width="360" height="320" rx="30" fill="url(#card)"/>
    <rect x="120" y="872" width="360" height="320" rx="30" stroke="#F0DDD3"/>
    <rect x="148" y="902" width="74" height="28" rx="14" fill="#FFF0E8"/>
    <text x="171" y="921" fill="#A45747" font-size="15" font-weight="700">技术</text>
    <text x="148" y="978" fill="#201A1C" font-size="36" font-weight="700">把博客做成一本能翻的册子</text>
    <text x="148" y="1048" fill="#6F6461" font-size="22">首页不再靠很多 hover 和彩色球体撑气氛，而是靠插画区、纸感卡片和更稳的留白。</text>
    <text x="148" y="1140" fill="#E76B5B" font-size="20" font-weight="700">阅读全文 →</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="872" width="360" height="320" rx="30" fill="#FFFDFB"/>
    <rect x="540" y="872" width="360" height="320" rx="30" stroke="#F0DDD3"/>
    <rect x="568" y="902" width="74" height="28" rx="14" fill="#FFF3DF"/>
    <text x="591" y="921" fill="#AD7A27" font-size="15" font-weight="700">随记</text>
    <text x="568" y="978" fill="#201A1C" font-size="36" font-weight="700">动画感可以有，但必须退到背景</text>
    <text x="568" y="1048" fill="#6F6461" font-size="22">小范围浮动、光斑、纸片阴影就够了。内容本身才是主角，效果只是帮它定气质。</text>
    <text x="568" y="1140" fill="#E76B5B" font-size="20" font-weight="700">阅读全文 →</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="960" y="872" width="360" height="320" rx="30" fill="#FFF9F6"/>
    <rect x="960" y="872" width="360" height="320" rx="30" stroke="#F0DDD3"/>
    <rect x="988" y="902" width="74" height="28" rx="14" fill="#F7ECFF"/>
    <text x="1011" y="921" fill="#7C5AA0" font-size="15" font-weight="700">生活</text>
    <text x="988" y="978" fill="#201A1C" font-size="36" font-weight="700">背景插画应该像封面，而不是贴纸</text>
    <text x="988" y="1048" fill="#6F6461" font-size="22">一张大的情绪插画占右侧或顶部，文章卡片维持克制，这样才不会显得廉价。</text>
    <text x="988" y="1140" fill="#E76B5B" font-size="20" font-weight="700">阅读全文 →</text>
  </g>

  <g opacity="0.9">
    <path d="M170 1342C238 1304 326 1290 432 1300" stroke="#E9C3B8" stroke-width="3" stroke-linecap="round"/>
    <path d="M1010 1322C1077 1296 1170 1288 1266 1308" stroke="#E9C3B8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <rect x="120" y="1286" width="1200" height="352" rx="34" fill="rgba(255,252,248,0.72)" stroke="#F0DDD3"/>
  <text x="160" y="1360" fill="#201A1C" font-size="44" font-weight="700">这版想解决的问题</text>
  <text x="160" y="1424" fill="#5E5250" font-size="24">1. 去掉现在那种“颜色很多但没有主视觉”的杂乱感</text>
  <text x="160" y="1474" fill="#5E5250" font-size="24">2. 让首页像一本作品集封面，而不是普通模板博客</text>
  <text x="160" y="1524" fill="#5E5250" font-size="24">3. 插画只做气质，不抢正文，不做满屏二次元元素堆砌</text>
  <text x="160" y="1574" fill="#5E5250" font-size="24">4. 分类、卡片、详情页统一成一套纸张 + 暮色 + 朱砂点缀语言</text>

  <text x="120" y="1716" fill="#826A67" font-size="18">Concept preview only · 如果你认可这张图的方向，我再按这个视觉语言把 Nuxt 页面重做。</text>
</svg>
